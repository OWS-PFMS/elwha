name: Publish to GitHub Packages

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          server-id: github
          server-username: GITHUB_ACTOR
          server-password: GITHUB_TOKEN
          cache: maven

      - name: Verify tag matches pom.xml version
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          POM_VERSION=$(mvn -q -Dexec.executable=echo -Dexec.args='${project.version}' --non-recursive exec:exec)
          if [ "$TAG_VERSION" != "$POM_VERSION" ]; then
            echo "::error::Tag version ($TAG_VERSION) does not match pom.xml version ($POM_VERSION)"
            exit 1
          fi
          echo "Version match confirmed: $TAG_VERSION"

      - name: Verify CHANGELOG entry exists
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          if ! grep -q "## \[${TAG_VERSION}\]" CHANGELOG.md; then
            echo "::error::CHANGELOG.md does not have an entry for version ${TAG_VERSION}"
            exit 1
          fi
          echo "CHANGELOG entry found for ${TAG_VERSION}"

      - name: Build and publish
        run: mvn -B clean deploy --file pom.xml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
